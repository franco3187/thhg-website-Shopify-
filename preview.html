<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Happy Hunting Grounds — Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;
    const brandLogo = './src/thhg_happy_hunting_grounds_logo.jpeg';

    const NAV_ITEMS = [
      { id: 'home',          label: 'Home' },
      { id: 'our-story',     label: 'Our Story' },
      { id: 'shop',          label: 'Shop' },
      { id: 'apparel',       label: 'Apparel' },
      { id: 'product',       label: 'Munchables' },
      { id: 'lives-changed', label: 'Lives Changed' },
      { id: 'contact',       label: 'Contact' },
    ];

    function FontStyles() {
      return (
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Oswald:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Rye&display=swap');
          .thhg-rye         { font-family: 'Rye', serif; }
          .thhg-oswald      { font-family: 'Oswald', sans-serif; }
          .thhg-baskerville { font-family: 'Libre Baskerville', serif; }
          .thhg-logo-pop    { animation: thhgLogoPop  5.5s ease-in-out infinite; }
          .thhg-hero-card   { animation: thhgFloat    6s   ease-in-out infinite; }
          .thhg-marquee     { animation: thhgMarquee  30s  linear     infinite; }
          .thhg-star-pop span                  { animation: thhgTwinkle 1.9s ease-in-out infinite; }
          .thhg-star-pop span:nth-child(2)     { animation-delay: 0.25s; }
          .thhg-star-pop span:nth-child(3)     { animation-delay: 0.5s;  }
          .thhg-shine { position: relative; overflow: hidden; }
          .thhg-shine::after {
            content: '';
            position: absolute;
            inset: 0 0 0 -45%;
            width: 35%;
            transform: skewX(-18deg);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.34), transparent);
            animation: thhgShine 3.6s ease-in-out infinite;
          }
          .thhg-card {
            transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
          }
          .thhg-card:hover {
            transform: translateY(-8px);
            border-color: #B5282A;
            box-shadow: 0 24px 58px rgba(15,26,46,0.16);
          }
          .thhg-mobile-nav {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 320ms ease, opacity 320ms ease;
            opacity: 0;
          }
          .thhg-mobile-nav.open {
            grid-template-rows: 1fr;
            opacity: 1;
          }
          .thhg-mobile-nav > div { overflow: hidden; }
          @keyframes thhgLogoPop {
            0%, 100% { transform: scale(1)     rotate(0deg); }
            45%       { transform: scale(1.055) rotate(-2deg); }
            60%       { transform: scale(1.035) rotate(2deg); }
          }
          @keyframes thhgFloat {
            0%, 100% { transform: translateY(0);    }
            50%       { transform: translateY(-10px); }
          }
          @keyframes thhgTwinkle {
            0%, 100% { opacity: 0.45; transform: scale(0.86); }
            50%       { opacity: 1;    transform: scale(1.12); }
          }
          @keyframes thhgMarquee {
            from { transform: translateX(0);    }
            to   { transform: translateX(-50%); }
          }
          @keyframes thhgShine {
            0%, 45%   { left: -45%; }
            70%, 100% { left: 120%; }
          }
          @media (prefers-reduced-motion: reduce) {
            .thhg-logo-pop, .thhg-hero-card,
            .thhg-star-pop span, .thhg-marquee,
            .thhg-shine::after { animation: none; }
            .thhg-card:hover   { transform: none; }
          }
        `}</style>
      );
    }

    function SiteShell({ currentPage, navigate, children }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const go = useCallback((id) => { navigate(id); setMenuOpen(false); }, [navigate]);
      return (
        <div className="min-h-screen bg-[#F5EDD8] text-[#1C1510]">
          <FontStyles />
          <header className="sticky top-0 z-50 border-b-[3px] border-[#C8882A] bg-[#0F1A2E]/95 backdrop-blur">
            <div className="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
              <button onClick={() => go('home')} className="flex items-center gap-3 text-left">
                <div className="thhg-logo-pop h-12 w-12 shrink-0 overflow-hidden rounded-full border-2 border-[#C8882A] bg-[#F5EDD8]">
                  <img src={brandLogo} alt="The Happy Hunting Grounds" className="h-full w-full object-cover" />
                </div>
                <div>
                  <div className="thhg-rye text-sm text-[#F5EDD8] sm:text-base">The Happy Hunting Grounds</div>
                  <div className="thhg-oswald mt-0.5 text-[10px] uppercase tracking-[0.28em] text-[#C8882A] sm:text-[11px]">Good vibes save lives</div>
                </div>
              </button>
              <nav className="hidden items-center gap-6 xl:flex" aria-label="Primary navigation">
                {NAV_ITEMS.map(({ id, label }) => (
                  <button key={id} onClick={() => go(id)}
                    className={`thhg-oswald text-sm uppercase tracking-[0.14em] transition ${currentPage === id ? 'text-[#E8A83A]' : 'text-[#F5EDD8] hover:text-white'}`}>
                    {label}
                  </button>
                ))}
              </nav>
              <div className="flex items-center gap-3">
                <button onClick={() => go('shop')} className="thhg-shine thhg-oswald rounded-sm border border-white/10 bg-[#B5282A] px-4 py-2 text-xs font-semibold uppercase tracking-[0.18em] text-[#F5EDD8] transition hover:-translate-y-0.5">Shop now</button>
                <button onClick={() => setMenuOpen((v) => !v)} aria-expanded={menuOpen} aria-label={menuOpen ? 'Close menu' : 'Open menu'} className="xl:hidden flex flex-col justify-center gap-[5px] p-2">
                  <span className={`block h-0.5 w-6 bg-[#F5EDD8] transition-all origin-center ${menuOpen ? 'translate-y-[7px] rotate-45' : ''}`} />
                  <span className={`block h-0.5 w-6 bg-[#F5EDD8] transition-opacity ${menuOpen ? 'opacity-0' : ''}`} />
                  <span className={`block h-0.5 w-6 bg-[#F5EDD8] transition-all origin-center ${menuOpen ? '-translate-y-[7px] -rotate-45' : ''}`} />
                </button>
              </div>
            </div>
            <div className={`thhg-mobile-nav xl:hidden border-t border-white/10 bg-[#0F1A2E] ${menuOpen ? 'open' : ''}`}>
              <div>
                <div className="mx-auto flex flex-col px-4 py-2 sm:px-6">
                  {NAV_ITEMS.map(({ id, label }) => (
                    <button key={id} onClick={() => go(id)} className={`thhg-oswald border-b border-white/5 py-3 text-left text-sm uppercase tracking-[0.18em] ${currentPage === id ? 'text-[#E8A83A]' : 'text-[#F5EDD8]'}`}>{label}</button>
                  ))}
                </div>
              </div>
            </div>
          </header>
          <main id="main-content">{children}</main>
          <footer className="border-t-[3px] border-[#C8882A] bg-[#0F1A2E] px-4 py-14 text-[#F5EDD8] sm:px-6 lg:px-8">
            <div className="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[1.4fr_0.6fr]">
              <div>
                <div className="flex items-center gap-4">
                  <div className="thhg-logo-pop h-16 w-16 shrink-0 overflow-hidden rounded-full border-2 border-[#C8882A] bg-[#F5EDD8]">
                    <img src={brandLogo} alt="The Happy Hunting Grounds" className="h-full w-full object-cover" />
                  </div>
                  <div className="thhg-rye text-3xl">The Happy Hunting Grounds</div>
                </div>
                <p className="thhg-baskerville mt-4 max-w-xl text-sm leading-8 text-[#E7D9BE]">Built from rescue, healing, and second chances. Every purchase funds shelter dogs, supports veterans, and keeps April's spirit moving forward in the world.</p>
                <p className="thhg-oswald mt-5 text-[11px] uppercase tracking-[0.2em] text-[#C8882A]">© {new Date().getFullYear()} The Happy Hunting Grounds · Good vibes save lives</p>
              </div>
              <nav className="grid grid-cols-2 content-start gap-3" aria-label="Footer navigation">
                {NAV_ITEMS.map(({ id, label }) => (
                  <button key={id} onClick={() => go(id)} className="thhg-oswald text-left text-xs uppercase tracking-[0.18em] text-[#D4B483] transition hover:text-white">{label}</button>
                ))}
              </nav>
            </div>
          </footer>
        </div>
      );
    }

    function PageHero({ eyebrow, title, subtitle, badge }) {
      return (
        <section className="relative overflow-hidden bg-[#0F1A2E]">
          <div className="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(200,136,42,0.16),transparent_35%),radial-gradient(circle_at_bottom_right,rgba(181,40,42,0.18),transparent_32%)]" />
          <img src={brandLogo} alt="" aria-hidden="true" className="pointer-events-none absolute -bottom-24 -left-20 h-72 w-72 rounded-full object-cover opacity-[0.06] grayscale lg:h-96 lg:w-96" />
          <div className="mx-auto grid max-w-7xl gap-10 px-4 py-16 sm:px-6 lg:grid-cols-[1.2fr_0.8fr] lg:px-8 lg:py-20">
            <div className="relative z-10">
              <div className="thhg-oswald mb-5 inline-flex items-center gap-3 bg-[#1B2A4A] px-4 py-2 text-[11px] font-medium uppercase tracking-[0.22em] text-[#F5EDD8]">
                <span className="text-[#B5282A]">★</span>{eyebrow}<span className="text-[#B5282A]">★</span>
              </div>
              <h1 className="thhg-rye max-w-2xl text-4xl leading-[1.08] text-[#F5EDD8] sm:text-5xl lg:text-6xl">{title}</h1>
              <div className="mt-6 flex max-w-xl items-center gap-3 text-[#B5282A]">
                <div className="h-[2px] flex-1 bg-[#B5282A]/35" /><span className="text-sm">★</span><div className="h-[2px] flex-1 bg-[#B5282A]/35" />
              </div>
              <p className="thhg-baskerville mt-6 max-w-xl text-base leading-8 text-[#E7D9BE] sm:text-lg">{subtitle}</p>
            </div>
            <div className="relative z-10 flex items-center justify-center">
              <div className="thhg-hero-card w-full max-w-sm border-[3px] border-[#C8882A] bg-[#F5EDD8] p-4 shadow-[0_16px_60px_rgba(0,0,0,0.35)]">
                <div className="bg-[linear-gradient(160deg,#1B2A4A,#162038)] p-5">
                  <div className="flex flex-col items-center border border-white/10 bg-[linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02))] p-6 text-center">
                    <div className="thhg-star-pop flex justify-center gap-2 text-[#C8882A]"><span>★</span><span>★</span><span>★</span></div>
                    <div className="thhg-logo-pop mx-auto mt-4 h-28 w-28 overflow-hidden rounded-full border-[3px] border-[#C8882A] bg-[#F5EDD8]">
                      <img src={brandLogo} alt="" className="h-full w-full object-cover" />
                    </div>
                    <div className="thhg-rye mt-4 text-xl text-[#F5EDD8]">The Happy Hunting Grounds</div>
                    <div className="thhg-rye mt-1 text-lg text-[#B5282A]">{badge.title}</div>
                    <div className="mt-4 w-full border-t-4 border-[#C8882A] bg-[#F5EDD8] p-4">
                      <div className="thhg-oswald text-[10px] uppercase tracking-[0.25em] text-[#1B2A4A]">{badge.eyebrow}</div>
                      <div className="thhg-rye mt-2 text-xl text-[#1B2A4A]">{badge.highlight}</div>
                      <p className="thhg-baskerville mt-2 text-xs leading-6 text-[#4A3822]">{badge.copy}</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function MarqueeBand({ items }) {
      const track = useMemo(() => [...items, ...items, ...items, ...items], [items]);
      return (
        <div className="overflow-hidden border-y-2 border-[#B5282A] bg-[#C8882A] py-3" aria-hidden="true">
          <div className="thhg-marquee flex w-max items-center gap-x-6">
            {track.map((item, i) => (
              <div key={i} className="thhg-rye flex shrink-0 items-center gap-4 text-sm text-[#0F1A2E] sm:text-[15px]">
                <span>{item}</span><span className="text-[#B5282A]">★</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SectionHeader({ eyebrow, title, copy }) {
      return (
        <div className="max-w-3xl">
          <div className="thhg-oswald text-xs uppercase tracking-[0.28em] text-[#B5282A]">{eyebrow}</div>
          <h2 className="thhg-rye mt-4 text-3xl text-[#1B2A4A] sm:text-4xl">{title}</h2>
          {copy && <p className="thhg-baskerville mt-5 text-base leading-8 text-[#4A3822]">{copy}</p>}
        </div>
      );
    }

    function CardGrid({ items, dark = false }) {
      return (
        <div className="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
          {items.map((item) => (
            <article key={item.title} className={`thhg-card overflow-hidden border shadow-[0_14px_40px_rgba(15,26,46,0.07)] ${dark ? 'border-white/10 bg-white/5' : 'border-[#D4B483] bg-white'}`}>
              <div className={`border-b-[3px] border-[#C8882A] p-6 ${dark ? 'bg-[linear-gradient(160deg,#20345a,#152340)]' : 'bg-[linear-gradient(160deg,#0F1A2E,#1B2A4A)]'}`}>
                <div className={`thhg-oswald text-[11px] uppercase tracking-[0.25em] ${dark ? 'text-[#D4B483]' : 'text-[#E8A83A]'}`}>{item.eyebrow}</div>
                <div className="thhg-rye mt-3 text-3xl leading-tight text-[#F5EDD8]">{item.title}</div>
              </div>
              <div className="p-6">
                <p className={`thhg-baskerville text-sm leading-7 ${dark ? 'text-[#E7D9BE]' : 'text-[#4A3822]'}`}>{item.copy}</p>
                {item.cta && (
                  <button onClick={item.onCta} className={`thhg-shine thhg-oswald mt-5 px-5 py-3 text-xs font-semibold uppercase tracking-[0.2em] ${dark ? 'bg-[#C8882A] text-[#0F1A2E]' : 'bg-[#B5282A] text-[#F5EDD8]'}`}>{item.cta}</button>
                )}
              </div>
            </article>
          ))}
        </div>
      );
    }

    function StatCard({ value, label }) {
      return (
        <div className="border border-[#D4B483] bg-white p-6 shadow-[0_10px_30px_rgba(15,26,46,0.05)]">
          <div className="thhg-rye text-4xl text-[#B5282A]">{value}</div>
          <div className="thhg-oswald mt-2 text-[11px] uppercase tracking-[0.18em] text-[#4A3822]">{label}</div>
        </div>
      );
    }

    function HomePage({ navigate }) {
      const [email, setEmail] = useState('');
      const [joined, setJoined] = useState(false);
      const handleJoin = (e) => { e.preventDefault(); if (email.trim()) setJoined(true); };
      const pillars = useMemo(() => [
        { eyebrow: 'Pillar one',   title: 'Rescue first',           copy: 'A portion of every order funds shelter essentials — beds, enrichment toys, vet care, and foster support for dogs waiting on their second chance.',                             cta: 'See impact',    onCta: () => navigate('lives-changed') },
        { eyebrow: 'Pillar two',   title: 'Healing through dogs',   copy: 'Dogs heal people. Veterans. Grieving families. Survivors. Our mission actively supports programs that put dogs in the lives of people who need them most.',                      cta: 'Our story',     onCta: () => navigate('our-story') },
        { eyebrow: 'Pillar three', title: 'Full transparency',      copy: 'Every dollar donated is documented. Every rescue spotlighted. Every bed sponsored is shown. We show the receipts because accountability is how real community is built.',       cta: 'View updates',  onCta: () => navigate('lives-changed') },
      ], [navigate]);
      const shopCards = useMemo(() => [
        { eyebrow: 'Apparel',      title: 'Second Chance Collection', copy: 'Bold heritage-style pieces that carry the mission on their sleeve. Hoodies, tees, and caps for the tribe.',                        cta: 'Shop apparel',  onCta: () => navigate('apparel') },
        { eyebrow: 'For the dogs', title: 'Munchables',               copy: 'Single-ingredient, all-natural treats for good dogs everywhere. Made with intention. Sold with purpose.',                          cta: 'Shop treats',   onCta: () => navigate('product') },
        { eyebrow: 'Healing story',title: 'The THHG Book',            copy: 'A story for every family who has loved and lost a dog. Written from the heart. Illustrated with warmth.',                          cta: 'View the book', onCta: () => navigate('shop') },
      ], [navigate]);
      return (
        <>
          <PageHero eyebrow="Saving lives on both ends of the leash" title="Built from love, loss, rescue, and a tribe that believes shopping should mean something." subtitle="The Happy Hunting Grounds is where second chances are celebrated, shelter dogs find voices, and every purchase does more than just arrive at your door."
            badge={{ title: 'Shop With Purpose', eyebrow: 'Brand promise', highlight: 'Good vibes save lives', copy: '25% minimum of every purchase goes directly back to rescue, shelter support, and veteran healing.' }} />
          <MarqueeBand items={['Your vibe attracts your tribe', 'Second chances', 'Built on transparency', 'Community over clout', 'Good vibes save lives']} />
          <section className="bg-[#FDFAF4] py-20">
            <div className="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
              <div className="mb-12"><SectionHeader eyebrow="Why we exist" title="A brand rooted in second chances." copy="We started because a dog named April changed everything — and losing her made us want to keep that love moving forward in the world." /></div>
              <CardGrid items={pillars} />
            </div>
          </section>
          <section className="bg-[#F5EDD8] py-20">
            <div className="mx-auto grid max-w-7xl gap-10 px-4 sm:px-6 lg:grid-cols-2 lg:px-8">
              <div className="border-t-4 border-[#C8882A] bg-white p-8 shadow-[0_18px_50px_rgba(15,26,46,0.08)]">
                <div className="thhg-oswald text-xs uppercase tracking-[0.28em] text-[#B5282A]">Our story</div>
                <h2 className="thhg-rye mt-4 text-3xl leading-tight text-[#1B2A4A] sm:text-4xl">Before the brand, there was April.</h2>
                <p className="thhg-baskerville mt-6 text-base leading-8 text-[#4A3822]">April was a rescue dog who healed a family and built the soul of everything you see here. When she passed, the grief was real — but so was the decision to honor her by helping other dogs, other families, and other people who needed exactly what she gave us.</p>
                <blockquote className="thhg-baskerville mt-6 border-l-[3px] border-[#B5282A] pl-4 text-[15px] italic leading-8 text-[#4A3822]">"We didn't build this to become a brand. We built it because the love was too big to stay quiet."</blockquote>
                <button onClick={() => navigate('our-story')} className="thhg-oswald mt-6 bg-[#1B2A4A] px-5 py-3 text-xs font-semibold uppercase tracking-[0.18em] text-[#F5EDD8]">Read our story →</button>
              </div>
              <div className="grid content-start gap-4 sm:grid-cols-2">
                {[{value:'25%+',label:'Minimum of profits donated back'},{value:'3',label:'Rescue orgs currently supported'},{value:'April',label:'The heart behind every product'},{value:'100%',label:'Real receipts. Full transparency.'}].map((s) => <StatCard key={s.label} {...s} />)}
              </div>
            </div>
          </section>
          <section className="bg-[#FDFAF4] py-20">
            <div className="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
              <div className="mb-10 flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
                <SectionHeader eyebrow="Shop with purpose" title="Every product carries the mission." />
                <button onClick={() => navigate('shop')} className="thhg-oswald shrink-0 border-2 border-[#1B2A4A] px-5 py-3 text-sm uppercase tracking-[0.18em] text-[#1B2A4A] transition hover:-translate-y-0.5">Browse all →</button>
              </div>
              <CardGrid items={shopCards} />
            </div>
          </section>
          <section className="border-y-[3px] border-[#C8882A] bg-[#1B2A4A] py-20 text-[#F5EDD8]">
            <div className="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
              <SectionHeader eyebrow="Where it goes" title="Your purchase does more than ship to your door." copy="We document every donation, every rescue spotlight, every wobbler purchased and bed sponsored. You should know exactly what your support is doing in the world." />
              <div className="mt-10 grid gap-6 sm:grid-cols-3">
                {[{stat:'Shelter beds',copy:'Sponsored directly through product sales for dogs waiting on adoption.'},{stat:'Enrichment toys',copy:'Wobblers and enrichment tools donated to keep shelter dogs mentally healthy.'},{stat:'Veteran support',copy:'Programs connecting veterans with rescue dogs as part of healing-focused initiatives.'}].map(({stat,copy}) => (
                  <div key={stat} className="border border-white/10 bg-white/5 p-6">
                    <div className="thhg-rye text-2xl text-[#E8A83A]">★</div>
                    <div className="thhg-rye mt-3 text-2xl text-[#F5EDD8]">{stat}</div>
                    <p className="thhg-baskerville mt-3 text-sm leading-7 text-[#C8C0B0]">{copy}</p>
                  </div>
                ))}
              </div>
              <button onClick={() => navigate('lives-changed')} className="thhg-shine thhg-oswald mt-10 border-2 border-[#C8882A] px-6 py-3 text-sm font-semibold uppercase tracking-[0.18em] text-[#F5EDD8] transition hover:-translate-y-0.5">See the full impact →</button>
            </div>
          </section>
          <section className="bg-[#FDFAF4] py-20">
            <div className="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8">
              <div className="overflow-hidden border border-[#D4B483] bg-white shadow-[0_20px_60px_rgba(15,26,46,0.08)]">
                <div className="grid lg:grid-cols-2">
                  <div className="border-t-4 border-[#C8882A] bg-[#F5EDD8] p-8 sm:p-10">
                    <div className="thhg-oswald text-xs uppercase tracking-[0.28em] text-[#B5282A]">Stay connected</div>
                    <h2 className="thhg-rye mt-4 text-3xl text-[#1B2A4A] sm:text-4xl">Join the pack.</h2>
                    <p className="thhg-baskerville mt-4 text-sm leading-7 text-[#4A3822]">Updates on new products, rescue spotlights, and what your purchases are actually doing in the world. No fluff. Just mission.</p>
                    {joined ? (
                      <p className="thhg-rye mt-8 text-2xl text-[#1B2A4A]">Welcome to the pack. ★</p>
                    ) : (
                      <form onSubmit={handleJoin} className="mt-8 flex flex-col gap-3 sm:flex-row">
                        <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Your email address" required className="thhg-baskerville min-w-0 flex-1 border border-[#D4B483] bg-white px-5 py-3 text-sm text-[#1C1510] outline-none placeholder:text-[#7a6750] focus:border-[#1B2A4A]" />
                        <button type="submit" className="thhg-oswald shrink-0 bg-[#B5282A] px-6 py-3 text-sm font-semibold uppercase tracking-[0.18em] text-[#F5EDD8]">Join the pack</button>
                      </form>
                    )}
                  </div>
                  <div className="bg-[#0F1A2E] p-8 sm:p-10 text-[#F5EDD8]">
